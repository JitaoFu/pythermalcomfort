# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: Test and publish pythermalcomfort

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:

  test:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'rc')

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13' ]
        platform: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6.0.2
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Tox and any other packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools
          python -m pip install "tox<4" tox-gh-actions
      - name: Run Tox
        run: |
          tox
        env:
          PLATFORM: ${{ matrix.platform }}

  deploy:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'rc')

    needs: test

    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
    - name: Set up Python 🐍
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.11'
    - name: Ensure tag commit is on master
      run: |
        git fetch origin master
        git merge-base --is-ancestor "$GITHUB_SHA" "origin/master"
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install build
    - name: Build distribution packages
      run: |
        python -m build
    - name: Publish pythermalcomfort 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
